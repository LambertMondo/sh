name: xray

type: "golang:1.24"

disk: 256

hooks:
  build: |
    go build -o proxy proxy.go

web:
  commands:
    start: ./proxy
  upstream:
    protocol: http
    port: 8080
  locations:
    "/":
      allow: false
      passthru: true
      scripts: false
      request_buffering:
        enabled: false

variables:
  env:
    TARGET_URL: "https://camerind.com"
